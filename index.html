<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tanvi Amrit Portfolio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link href="includes/style.css" rel="stylesheet">
  </head>
<body>

    <div id="cursor"><span id="cursor-label">:)</span></div>

    <div id="loader">
        <div id="loader-name" aria-label="tanvi amrit"></div>
    </div>

    <header>
        <div id="name-logo">tanvi amrit</div>
        <nav>
        <a href="#about" id="nav-about">About</a>
        <a href="#gallery" id="nav-gallery">gallery</a>
        <a href="#projects" id="nav-projects">Project List-View</a>
      </nav>
    </header>

  <main>
    <!-- Grid View -->
    <div id="grid-view">
      <div class="grid-wrapper" id="grid-wrapper">
        <!-- Injected by script -->
      </div>
    </div>

    <!-- List View -->
    <div id="list-view">
      <div class="list-header">
        <span>No.</span>
        <span>Project</span>
        <span>Type</span>
      </div>
      <div id="list-rows">
        <!-- Injected by script -->
        </div>
    </div>
  </main>

  <!-- Gallery View -->
  <div id="gallery-view">
    <div class="gallery-intro">
      <h2>Motion &amp; Marks</h2>
      <p>a loose collection of drawings, loops and experiments .</p>
    </div>
    <div class="gallery-grid" id="gallery-grid"><!-- injected --></div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true">
    <button id="modal-close" aria-label="Close">✕</button>
    <div id="modal-blur-bg"></div>
    <div id="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>


  <!-- About Overlay -->
   
  <div id="about-overlay" role="dialog" aria-modal="true" aria-label="About">
  <div id="about-blur-bg"></div>
  <div id="about-box">
    <button id="about-close" aria-label="Close">✕</button>
    <div id="about-content"><!-- injected --></div>
  </div>
</div>


  <!-- Gallery Lightbox -->
  <div id="lightbox">
    <div id="lightbox-bg"></div>
    <img id="lightbox-img" src="" alt="">
  </div>

    <script src="includes/script.js"></script>

</body>
</html>
